version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      ai-sdk:
        patterns:
          - "@ai-sdk/*"
          - "ai"
      a2a:
        patterns:
          - "@a2a-js/*"
      mcp:
        patterns:
          - "@modelcontextprotocol/*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
